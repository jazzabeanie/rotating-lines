name: Build Pebble App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python2 python2-dev python-setuptools \
            build-essential gcc-arm-none-eabi libsdl1.2debian libfdt1 \
            libpixman-1-0 gcc-multilib libstdc++6:i386 \
            curl ca-certificates git
          curl -sSL https://bootstrap.pypa.io/pip/2.7/get-pip.py -o /tmp/get-pip.py
          sudo python2 /tmp/get-pip.py
          sudo python2 -m pip install virtualenv

      - name: Install Pebble SDK (community fork)
        run: |
          git clone --recursive https://github.com/pebble-dev/pebble-tool.git "$HOME/pebble-tool"
          cd "$HOME/pebble-tool"
          virtualenv -p python2 .env
          . .env/bin/activate
          pip install -r requirements.txt
          pip install -e .
          # Install SDK core (downloads toolchain + platform SDKs)
          pebble sdk install latest --no-analytics || true
          echo "$HOME/pebble-tool/.env/bin" >> "$GITHUB_PATH"

      - name: Build
        run: |
          . "$HOME/pebble-tool/.env/bin/activate"
          pebble build

      - name: Upload .pbw artifact
        uses: actions/upload-artifact@v4
        with:
          name: rotating-lines-face-pbw
          path: build/*.pbw
          if-no-files-found: error
